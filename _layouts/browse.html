---
layout: page
custom-foot: js/browse-js.html
---

{{ content }}

<div class="browse-layout">

  <!-- ================= LEFT SIDEBAR ================= -->
  <aside class="browse-sidebar">

    <!-- SEARCH -->
    <form role="search" id="browseFilter" onsubmit="submitFilter(); return false;">
      <input type="text"
             class="form-control mb-2"
             id="filterTextBox"
             placeholder="Search...">
      
      <div class="d-flex gap-2 mb-3">
        <button class="btn btn-success w-100" type="submit">Search</button>
        <button class="btn btn-outline-secondary w-100"
                onclick="resetFilter(); return false;">
          Reset
        </button>
      </div>
    </form>

    <div class="h5 mb-3" id="numberOf"></div>

    <!-- SORT -->
    <div class="dropdown mb-3">
      <button class="btn btn-secondary w-100 dropdown-toggle"
              type="button"
              data-bs-toggle="dropdown">
        Sort: <span id="sortFilter">Random</span>
      </button>

      <div class="dropdown-menu browse-sort-menu w-100">
        <button class="dropdown-item browse-sort-item active" data-filter="random">Random</button>
        <button class="dropdown-item browse-sort-item" data-filter="title">Title</button>

        {% assign sort_options = site.data.config-browse | where_exp: 'i','i.sort_name != nil' %}
        {% for o in sort_options %}
        <button class="dropdown-item browse-sort-item" data-filter="{{ o.field }}">
          {{ o.sort_name }}
        </button>
        {% endfor %}
      </div>
    </div>

    <!-- PLACE FOR EXTRA FILTERS -->
    <div class="browse-filters">
      <p class="text-muted small">Filters</p>

      <!-- Example placeholders -->
      <button class="btn btn-sm btn-outline-light w-100 mb-2">Painting</button>
      <button class="btn btn-sm btn-outline-light w-100 mb-2">Illustration</button>
      <button class="btn btn-sm btn-outline-light w-100 mb-2">Sketch</button>
    </div>

  </aside>

  <!-- ================= MAIN CONTENT ================= -->
  <main class="browse-main">

    <div id="loadingIcon" class="text-center">
      <div class="spinner-border text-dark" role="status"></div>
    </div>

    <div class="row" id="browseItems"></div>

  </main>

</div>
