---
layout: page
custom-foot: js/browse-js.html
---
<div class="browse-layout" style="color: white;">

  <!-- LEFT SIDEBAR -->
  <aside class="browse-sidebar">

    <form role="search" id="browseFilter" onsubmit="submitFilter(); return false;">
      <input type="text"
             class="form-control mb-2"
             id="filterTextBox"
             placeholder="Search...">

      <div class="d-grid gap-2 mb-3">
        <button class="btn btn-success" type="submit">Search</button>
        <button class="btn btn-outline-secondary"
                onclick="resetFilter(); return false;">
          Reset
        </button>
      </div>
    </form>

    <div class="h5 mb-3" id="numberOf"></div>

    <div class="dropdown mb-3">
      <button class="btn btn-secondary w-100 dropdown-toggle"
              type="button"
              data-bs-toggle="dropdown">
        Sort: <span id="sortFilter">Random</span>
      </button>

      <div class="dropdown-menu w-100">
        <button class="dropdown-item browse-sort-item active" data-filter="random">Random</button>
        <button class="dropdown-item browse-sort-item" data-filter="title">Title</button>
      </div>
    </div>

    <div class="browse-filters">
      <p class="text-muted small">Filters</p>

      <button class="btn btn-sm btn-outline-dark w-100 mb-2">Painting</button>
      <button class="btn btn-sm btn-outline-dark w-100 mb-2">Illustration</button>
      <button class="btn btn-sm btn-outline-dark w-100 mb-2">Sketch</button>
    </div>

  </aside>

  <!-- RIGHT CONTENT -->
  <main class="browse-main">

    <div id="loadingIcon" class="text-center">
      <div class="spinner-border text-dark"></div>
    </div>

    <div class="row" id="browseItems"></div>

  </main>

</div>
