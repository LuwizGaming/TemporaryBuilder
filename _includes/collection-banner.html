{% assign banner_image = page.image | default: site.data.theme.featured-image %}

{% if banner_image %}

<style>
#home-banner {
    background-image: url('{{ banner_image | relative_url }}');
    background-size: cover;
    background-repeat: no-repeat;
    background-position: {{ site.data.theme.home-banner-image-position | default: 'center' }};
}

/* hero spacing */
#home-title-box {
    padding-top: {{ site.data.theme.home-title-y-padding | default: '5em' }};
    padding-bottom: {{ site.data.theme.home-title-y-padding | default: '5em' }};
}

/* mobile adjustment */
@media screen and (max-width: 576px) {
    #home-title-box {
        max-height: 500px;
    }
}
</style>

<div id="home-banner" class="container-fluid mb-0 p-0">

    <div id="home-title-box" class="position-relative">

        

            {% unless page.hide_tagline %}
              {% if page.tagline %}
                <p class="mb-0">{{ page.tagline }}</p>
              {% elsif site.tagline %}
                <p class="mb-0">{{ site.tagline }}</p>
              {% endif %}
            {% endunless %}

        </div>

    </div>

</div>

{% endif %}
