.profile-nav {
  display: flex;
  justify-content: center;
  gap: 20px;

  background: rgba(15, 15, 20, 0.5);

  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);

  border-bottom: 1px solid rgba(255,255,255,0.1);

}

<div class="profile-nav d-flex justify-content-center gap-3">

  <a href="{{ '/biography/' | relative_url }}"
     class="{% if page.url contains 'biography' %}active{% endif %}">
    Overview
  </a>

  <a href="{{ '/gallery/' | relative_url }}"
     class="{% if page.url contains 'gallery' %}active{% endif %}">
    Gallery
  </a>

</div>
